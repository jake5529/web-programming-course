<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LR11 Interactive Examples - Docker & CI/CD</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #1f2a44 0%, #2b3a67 100%);
            color: #2d3748;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            background: #ffffff;
            padding: 30px;
            border-radius: 10px;
            margin-bottom: 28px;
            box-shadow: 0 12px 36px rgba(0, 0, 0, 0.18);
        }

        h1 {
            color: #1f2a44;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #4a5568;
            font-size: 16px;
        }

        .search-box {
            margin-top: 18px;
        }

        #search {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #d2d8e5;
            border-radius: 6px;
            font-size: 16px;
        }

        #search:focus {
            outline: none;
            border-color: #2b3a67;
            box-shadow: 0 0 0 3px rgba(43, 58, 103, 0.15);
        }

        .filter-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 14px;
        }

        .tag {
            padding: 6px 12px;
            border: 2px solid #c7cfdf;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
            background: #fff;
            color: #1f2a44;
            font-size: 14px;
        }

        .tag:hover {
            border-color: #2b3a67;
            color: #2b3a67;
        }

        .tag.active {
            background: #2b3a67;
            color: #fff;
            border-color: #2b3a67;
        }

        .examples-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .example-card {
            background: #fff;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.18);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .example-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 16px 38px rgba(0, 0, 0, 0.22);
        }

        .example-header {
            background: linear-gradient(135deg, #374785 0%, #1f2a44 100%);
            color: #fff;
            padding: 16px;
        }

        .example-title {
            font-size: 17px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .example-category {
            display: inline-block;
            background: rgba(255, 255, 255, 0.2);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            margin-top: 8px;
        }

        .example-body {
            padding: 16px;
        }

        .example-description {
            color: #4a5568;
            margin-bottom: 12px;
            font-size: 14px;
            line-height: 1.45;
        }

        pre {
            background: #1f1f1f;
            border-radius: 6px;
            padding: 12px;
            overflow-x: auto;
            margin-bottom: 8px;
        }

        code {
            font-family: 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.4;
        }

        .hljs {
            background: #1f1f1f !important;
        }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 30px 0;
        }

        .pagination button {
            padding: 8px 12px;
            border: none;
            border-radius: 5px;
            background: #4a5f96;
            color: #fff;
            cursor: pointer;
        }

        .pagination button.active {
            background: #1f2a44;
        }

        .not-found {
            text-align: center;
            padding: 60px 20px;
            color: #e2e8f0;
        }

        footer {
            text-align: center;
            color: #e2e8f0;
            padding: 20px;
            margin-top: 20px;
        }

        @media (max-width: 768px) {
            .examples-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>LR11: Docker & CI/CD - Interactive Examples</h1>
            <p class="subtitle">Local-first DevOps: контейнеризация, CI и локальный release-контур</p>

            <div class="search-box">
                <input type="text" id="search" placeholder="Поиск по названию, описанию или коду...">
            </div>

            <div class="filter-tags">
                <span class="tag active" data-filter="all">Все</span>
                <span class="tag" data-filter="docker">Docker</span>
                <span class="tag" data-filter="compose">Compose</span>
                <span class="tag" data-filter="ci">CI</span>
                <span class="tag" data-filter="cd">CD-local</span>
                <span class="tag" data-filter="debug">Debug</span>
            </div>
        </header>

        <div id="examples" class="examples-grid"></div>
        <div id="pagination" class="pagination"></div>

        <div id="notFound" class="not-found" style="display: none;">
            <h3>Ничего не найдено</h3>
            <p>Измените фильтр или поисковый запрос</p>
        </div>
    </div>

    <footer>
        LR11 • DevOps - Docker & CI/CD (Local-first)
    </footer>

    <script>
        const examples = [
            {
                id: 1,
                title: 'Docker build локального backend образа',
                category: 'docker',
                description: 'Сборка контейнерного образа из Dockerfile',
                code: `docker build -t quiz-backend:local .`
            },
            {
                id: 2,
                title: 'Запуск backend контейнера',
                category: 'docker',
                description: 'Локальный запуск собранного образа с переменными среды',
                code: `docker run --rm -p 3000:3000 --env-file .env quiz-backend:local`
            },
            {
                id: 3,
                title: 'Multi-stage Dockerfile',
                category: 'docker',
                description: 'Скелет Dockerfile для builder и runner стадий',
                code: `FROM node:20-alpine AS builder
WORKDIR /app
COPY package*.json ./
RUN npm ci
COPY . .
RUN npm run build

FROM node:20-alpine AS runner
WORKDIR /app
ENV NODE_ENV=production
COPY package*.json ./
RUN npm ci --omit=dev
COPY --from=builder /app/dist ./dist
CMD ["node", "dist/index.js"]`
            },
            {
                id: 4,
                title: 'Compose: старт стека',
                category: 'compose',
                description: 'Поднять backend + db в фоне',
                code: `docker compose up --build -d
docker compose ps`
            },
            {
                id: 5,
                title: 'Compose service definition',
                category: 'compose',
                description: 'Минимальная связка backend и Postgres',
                code: `services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: quiz
      POSTGRES_USER: quiz
      POSTGRES_PASSWORD: quiz

  backend:
    build: .
    env_file: [.env]
    depends_on:
      - db
    ports:
      - "3000:3000"`
            },
            {
                id: 6,
                title: 'Compose logs',
                category: 'debug',
                description: 'Быстрая проверка логов проблемного сервиса',
                code: `docker compose logs -f backend`
            },
            {
                id: 7,
                title: 'Healthcheck smoke',
                category: 'cd',
                description: 'Минимальная проверка после старта контейнеров',
                code: `curl -f http://localhost:3000/health`
            },
            {
                id: 8,
                title: 'CI workflow skeleton',
                category: 'ci',
                description: 'Базовый GitHub Actions pipeline для LR11',
                code: `name: CI
on: [push, pull_request, workflow_dispatch]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run lint
      - run: npm run test
      - run: npm run build
      - run: docker build -t quiz-backend:ci .`
            },
            {
                id: 9,
                title: 'Local CI fallback',
                category: 'ci',
                description: 'Локальное повторение шагов CI без GitHub runner',
                code: `npm ci
npm run lint
npm run test
npm run build
docker build -t quiz-backend:ci .`
            },
            {
                id: 10,
                title: 'act запуск workflow',
                category: 'ci',
                description: 'Опциональный запуск GitHub Actions локально',
                code: `act -W .github/workflows/ci.yml`
            },
            {
                id: 11,
                title: 'Release tag для локального образа',
                category: 'cd',
                description: 'Тегирование версии перед локальным релизом',
                code: `TAG=$(date +%Y%m%d-%H%M%S)
docker build -t quiz-backend:$TAG .`
            },
            {
                id: 12,
                title: 'Rollback на предыдущий tag',
                category: 'cd',
                description: 'Локальный откат при неуспешном smoke-check',
                code: `PREV_TAG=20260226-101500
export BACKEND_IMAGE=quiz-backend:$PREV_TAG
docker compose down
docker compose up -d`
            },
            {
                id: 13,
                title: 'Вход в контейнер для диагностики',
                category: 'debug',
                description: 'Проверка файлов и окружения внутри контейнера',
                code: `docker exec -it <backend_container_id> sh`
            },
            {
                id: 14,
                title: 'Очистка локального окружения',
                category: 'debug',
                description: 'Удаление контейнеров, сети и volumes после экспериментов',
                code: `docker compose down -v`
            }
        ];

        let currentFilter = 'all';
        let currentPage = 1;
        const ITEMS_PER_PAGE = 6;

        function filterExamples() {
            let filtered = examples;

            if (currentFilter !== 'all') {
                filtered = filtered.filter((e) => e.category === currentFilter);
            }

            const searchTerm = document.getElementById('search').value.toLowerCase();
            if (searchTerm) {
                filtered = filtered.filter((e) =>
                    e.title.toLowerCase().includes(searchTerm) ||
                    e.description.toLowerCase().includes(searchTerm) ||
                    e.code.toLowerCase().includes(searchTerm)
                );
            }

            return filtered;
        }

        function renderExamples() {
            const filtered = filterExamples();
            const totalPages = Math.ceil(filtered.length / ITEMS_PER_PAGE);
            const start = (currentPage - 1) * ITEMS_PER_PAGE;
            const pageItems = filtered.slice(start, start + ITEMS_PER_PAGE);

            const container = document.getElementById('examples');
            container.innerHTML = '';

            if (pageItems.length === 0) {
                document.getElementById('notFound').style.display = 'block';
                document.getElementById('pagination').innerHTML = '';
                return;
            }

            document.getElementById('notFound').style.display = 'none';

            pageItems.forEach((example) => {
                const card = document.createElement('div');
                card.className = 'example-card';
                card.innerHTML = `
                    <div class="example-header">
                        <div class="example-title">${example.title}</div>
                        <span class="example-category">${example.category.toUpperCase()}</span>
                    </div>
                    <div class="example-body">
                        <p class="example-description">${example.description}</p>
                        <pre><code class="language-yaml">${escapeHtml(example.code)}</code></pre>
                    </div>
                `;
                container.appendChild(card);
            });

            hljs.highlightAll();
            renderPagination(totalPages);
        }

        function renderPagination(totalPages) {
            const container = document.getElementById('pagination');

            if (totalPages <= 1) {
                container.innerHTML = '';
                return;
            }

            container.innerHTML = '';
            for (let i = 1; i <= totalPages; i += 1) {
                const button = document.createElement('button');
                button.textContent = i;
                if (i === currentPage) {
                    button.className = 'active';
                }

                button.addEventListener('click', () => {
                    currentPage = i;
                    renderExamples();
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                });

                container.appendChild(button);
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        document.getElementById('search').addEventListener('input', () => {
            currentPage = 1;
            renderExamples();
        });

        document.querySelectorAll('.tag').forEach((tag) => {
            tag.addEventListener('click', () => {
                document.querySelectorAll('.tag').forEach((t) => t.classList.remove('active'));
                tag.classList.add('active');
                currentFilter = tag.dataset.filter;
                currentPage = 1;
                renderExamples();
            });
        });

        renderExamples();
    </script>
</body>
</html>
